{% extends "base.html" %}
{% block content %}

<style>
    /* Wrapper para centralizar o formulário na tela */
    .form-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 80vh; 
        padding: 40px 20px;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* Caixinha principal do formulário */
    .form-container {
        background-color: #ffffff;
        padding: 40px 30px;
        border-radius: 10px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 500px;
    }

    .form-container h2 {
        text-align: center;
        color: #333333;
        margin-bottom: 30px;
        font-size: 24px;
        border-bottom: 1px solid #f0f2f5;
        padding-bottom: 10px;
    }

    /* Estilização dos grupos de campos */
    .input-group {
        margin-bottom: 20px;
    }

    .input-group label {
        display: block;
        color: #555555;
        margin-bottom: 8px;
        font-size: 14px;
        font-weight: 500;
    }

    /* Pega todos os tipos de inputs que o Django pode gerar */
    .input-group input,
    .input-group select,
    .input-group textarea {
        width: 100%;
        padding: 12px;
        border: 1px solid #cccccc;
        border-radius: 6px;
        font-size: 14px;
        outline: none;
        transition: border-color 0.3s;
        font-family: inherit;
    }

    /* Tratamento para o input de arquivo (file) ficar mais bonito */
    .input-group input[type="file"] {
        padding: 9px;
        background-color: #f8f9fa;
    }

    .input-group input:focus,
    .input-group select:focus,
    .input-group textarea:focus {
        border-color: #007bff;
    }

    /* Exibição de erros de validação do Django */
    .erro-campo {
        color: #dc3545;
        font-size: 12px;
        margin-top: 5px;
        display: block;
    }

    /* ========================================= */
    /* AJUSTE DOS BOTÕES (LADO A LADO)           */
    /* ========================================= */

    /* Container que alinha os botões na horizontal */
    .buttons-container {
        display: flex;
        gap: 15px; /* Espaço entre os botões */
        margin-top: 25px;
    }

    /* Base compartilhada para ambos os botões ficarem do mesmo tamanho */
    .btn-submit, 
    .btn-cancel {
        flex: 1; /* Faz cada botão ocupar 50% do espaço */
        padding: 12px;
        border-radius: 6px;
        font-size: 16px;
        font-weight: bold;
        text-align: center;
        text-decoration: none; /* Tira o sublinhado do link <a> do cancelar */
        cursor: pointer;
        transition: all 0.3s;
        display: inline-block;
    }

    /* Botão de Envio/Alterar (Azul) */
    .btn-submit {
        background-color: #007bff;
        color: #ffffff;
        border: none;
    }

    .btn-submit:hover {
        background-color: #0056b3;
    }

    /* Botão de Cancelar (Fundo branco, texto e borda vermelha) */
    .btn-cancel {
        background-color: #ffffff;
        color: #dc3545;
        border: 1px solid #dc3545;
    }

    .btn-cancel:hover {
        background-color: #dc3545;
        color: #ffffff;
    }

</style>

<div class="form-wrapper">
    <div class="form-container">
        
        <h2>Editar Cliente</h2>
        
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            
            {% for field in form %}
                <div class="input-group">
                    <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <span class="erro-campo">{{ field.errors.0 }}</span>
                    {% endif %}
                </div>
            {% endfor %}
            
            <div class="buttons-container">
                <button type="submit" class="btn-submit">Salvar Alterações</button>
                <a href="{% url 'client_list' %}" class="btn-cancel">Cancelar</a>
            </div>
            
        </form>
    </div>
</div>
{% endblock %}
